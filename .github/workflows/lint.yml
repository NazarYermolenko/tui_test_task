name: Lint & Format Check
on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Check Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run type check
        run: npm run type-check
      - name: Run lint check
        run: npm run lint
